install: "ci/install/${PLATFORM}.sh"
script: "ci/run/${PLATFORM}.sh"

# Setup caching as recommended by Travis CI
before_cache:
  - rm -f  $HOME/.gradle/caches/modules-2/modules-2.lock
  - rm -fr $HOME/.gradle/caches/*/plugin-resolution/
cache:
  directories:
    - $HOME/.gradle/caches/
    - $HOME/.gradle/wrapper/
