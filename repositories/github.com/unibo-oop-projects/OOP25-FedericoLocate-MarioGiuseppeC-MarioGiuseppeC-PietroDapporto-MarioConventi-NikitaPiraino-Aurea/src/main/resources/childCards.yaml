# Child cards configuration file.
# These cards are not part of the main drawable deck.
# They must only be triggered as consequences of specific choices
# made on parent cards, according to the follow-up rules.
cards:
  - id: bus_realestate_offer #child prof 1
    character: BUSINESSMAN
    description: "A local real estate owner offers the university a package of apartments in central Cesena before prices rise again."
    refusal:
      text: "No more buildings"
      effects:
        - parameter: REPUTATION
          delta: -7
        - parameter: PROFESSORS
          delta: -15
    approval:
      text: "Buy them quickly"
      effects:
        - parameter: PROFESSORS
          delta: 15
        - parameter: FINANCES
          delta: -14

  - id: stu_professor_housing
